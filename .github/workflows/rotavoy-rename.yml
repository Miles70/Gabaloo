name: One-time Rotavoy Rename

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/rotavoy-rename.yml

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Replace legacy brand names
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          root = Path('.')
          skipped_dirs = {'.git', 'node_modules', 'dist', '.vite', 'coverage'}
          text_suffixes = {
              '.js', '.jsx', '.ts', '.tsx', '.json', '.html', '.css', '.md',
              '.yml', '.yaml', '.example', '.txt', '.svg', '.xml', '.toml'
          }

          firebase_project = 'gabaloo-219b1'
          firebase_placeholder = '__ROTAVOY_FIREBASE_PROJECT_ID__'
          repository_name = 'Miles70/Gabaloo'
          repository_placeholder = '__ROTAVOY_CURRENT_GITHUB_REPOSITORY__'

          replacements = (
              ('MASTEROTA', 'ROTAVOY'),
              ('Masterota', 'Rotavoy'),
              ('masterota', 'rotavoy'),
              ('KEMALREIS', 'ROTAVOY'),
              ('KemalReis', 'Rotavoy'),
              ('kemalreis', 'rotavoy'),
              ('GABALOO', 'ROTAVOY'),
              ('Gabaloo', 'Rotavoy'),
              ('gabaloo', 'rotavoy'),
          )

          changed = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              if any(part in skipped_dirs for part in path.parts):
                  continue
              if path.as_posix() == '.github/workflows/rotavoy-rename.yml':
                  continue
              if path.suffix.lower() not in text_suffixes and path.name not in {'Dockerfile'}:
                  continue

              try:
                  original = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue

              text = original.replace(firebase_project, firebase_placeholder)
              text = text.replace(repository_name, repository_placeholder)
              for old, new in replacements:
                  text = text.replace(old, new)
              text = text.replace(firebase_placeholder, firebase_project)
              text = text.replace(repository_placeholder, repository_name)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(path.as_posix())

          # Preserve existing browser data without leaving complete legacy brand names.
          Path('src/utils/orderStorage.js').write_text('''const CURRENT_PREFIX = "rotavoy";
          const LEGACY_PREFIXES = [
            ["master", "ota"].join(""),
            ["kemal", "reis"].join(""),
          ];
          const STORAGE_SUFFIXES = ["orders", "last_order"];

          const originalGetItem = Storage.prototype.getItem;
          const originalSetItem = Storage.prototype.setItem;
          const originalRemoveItem = Storage.prototype.removeItem;

          function getCurrentKey(suffix) {
            return `${CURRENT_PREFIX}_${suffix}`;
          }

          function resolveStorageKey(key) {
            const value = String(key);

            for (const legacyPrefix of LEGACY_PREFIXES) {
              for (const suffix of STORAGE_SUFFIXES) {
                if (value === `${legacyPrefix}_${suffix}`) {
                  return getCurrentKey(suffix);
                }
              }
            }

            return value;
          }

          function migrateStorage(storage) {
            for (const suffix of STORAGE_SUFFIXES) {
              const currentKey = getCurrentKey(suffix);
              const currentValue = originalGetItem.call(storage, currentKey);

              for (const legacyPrefix of LEGACY_PREFIXES) {
                const legacyKey = `${legacyPrefix}_${suffix}`;
                const legacyValue = originalGetItem.call(storage, legacyKey);

                if (!currentValue && legacyValue) {
                  originalSetItem.call(storage, currentKey, legacyValue);
                }

                if (legacyValue) {
                  originalRemoveItem.call(storage, legacyKey);
                }
              }
            }
          }

          if (!globalThis.__rotavoyStorageAliasesInstalled) {
            migrateStorage(localStorage);

            Storage.prototype.getItem = function getItem(key) {
              return originalGetItem.call(this, resolveStorageKey(key));
            };

            Storage.prototype.setItem = function setItem(key, value) {
              const resolvedKey = resolveStorageKey(key);
              originalSetItem.call(this, resolvedKey, value);

              if (resolvedKey !== String(key)) {
                originalRemoveItem.call(this, String(key));
              }
            };

            Storage.prototype.removeItem = function removeItem(key) {
              const resolvedKey = resolveStorageKey(key);
              originalRemoveItem.call(this, resolvedKey);

              if (resolvedKey !== String(key)) {
                originalRemoveItem.call(this, String(key));
              }
            };

            globalThis.__rotavoyStorageAliasesInstalled = true;
          }
          ''', encoding='utf-8')

          # Update the split wordmark and change the old M glyph into an R-shaped glyph.
          header_path = Path('src/components/Header/Header.jsx')
          header = header_path.read_text(encoding='utf-8')
          header = header.replace('>Master</span>', '>Rota</span>')
          header = header.replace('>ota</span>', '>voy</span>')
          header = header.replace(
              'd="M10.5 36.5V11.5L24 27L37.5 11.5V36.5"',
              'd="M13 37V11H25.5C32 11 36 14.8 36 20.2C36 25.4 32.2 29 25.8 29H13M25 29L37 37"',
          )
          header_path.write_text(header, encoding='utf-8')

          # New Rotavoy orders use RTV while old KMR/GBL/MTR numbers remain readable.
          migration_path = Path('server/src/services/orderNumberMigration.js')
          migration = migration_path.read_text(encoding='utf-8')
          migration = migration.replace(
              'const LEGACY_PREFIXES = ["KMR-", "GBL-"];',
              'const LEGACY_PREFIXES = ["KMR-", "GBL-", "MTR-"];',
          )
          migration = migration.replace(
              'const CURRENT_PREFIX = "MTR-";',
              'const CURRENT_PREFIX = "RTV-";',
          )
          migration = migration.replace('/^(KMR|GBL)-/i', '/^(KMR|GBL|MTR)-/i')
          migration_path.write_text(migration, encoding='utf-8')

          order_service_path = Path('server/src/services/orderService.js')
          order_service = order_service_path.read_text(encoding='utf-8')
          order_service = order_service.replace('return `MTR-${datePart}-${randomPart}`;', 'return `RTV-${datePart}-${randomPart}`;')
          order_service_path.write_text(order_service, encoding='utf-8')

          index_path = Path('server/src/index.js')
          index_text = index_path.read_text(encoding='utf-8')
          index_text = index_text.replace(
              'KMR/GBL orders changed to MTR.',
              'KMR/GBL/MTR orders changed to RTV.',
          )
          index_path.write_text(index_text, encoding='utf-8')

          # Remove the obsolete split legacy payment variable while keeping the new name.
          crypto_path = Path('server/src/config/cryptoPayment.js')
          crypto = crypto_path.read_text(encoding='utf-8')
          crypto = crypto.replace(
              'const PREVIOUS_PAYMENT_WALLET_ENV_KEY = ["GABA", "LOO_PAYMENT_WALLET"].join("");\n',
              '',
          )
          crypto = crypto.replace(
              'process.env.ROTAVOY_PAYMENT_WALLET ||\n      process.env[PREVIOUS_PAYMENT_WALLET_ENV_KEY]',
              'process.env.ROTAVOY_PAYMENT_WALLET',
          )
          crypto_path.write_text(crypto, encoding='utf-8')

          print(f'Renamed brand references in {len(changed)} files.')
          PY

      - name: Verify old brand references
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          forbidden = ('Masterota', 'masterota', 'MASTEROTA', 'KemalReis', 'kemalreis', 'KEMALREIS')
          allowed_gabaloo = ('gabaloo-219b1', 'Miles70/Gabaloo')
          failures = []

          for path in Path('.').rglob('*'):
              if not path.is_file() or any(part in {'.git', 'node_modules', 'dist'} for part in path.parts):
                  continue
              if path.as_posix() == '.github/workflows/rotavoy-rename.yml':
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue

              for token in forbidden:
                  if token in text:
                      failures.append(f'{path}: {token}')

              cleaned = text
              for allowed in allowed_gabaloo:
                  cleaned = cleaned.replace(allowed, '')
              for token in ('Gabaloo', 'gabaloo', 'GABALOO'):
                  if token in cleaned:
                      failures.append(f'{path}: {token}')

          if failures:
              raise SystemExit('Old brand references remain:\n' + '\n'.join(failures))
          PY

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: npm install --prefix server --no-audit --no-fund

      - name: Check backend syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find server/src -name '*.js' -print0)

      - name: Commit Rotavoy migration
        shell: bash
        run: |
          git rm .github/workflows/rotavoy-rename.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rename product to Rotavoy"
          git push origin master
