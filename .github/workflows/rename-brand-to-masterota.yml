name: Rename brand to Masterota

on:
  push:
    branches:
      - master
    paths:
      - scripts/rename-brand-to-masterota.mjs
      - .github/workflows/rename-brand-to-masterota.yml

permissions:
  contents: write

jobs:
  rename-brand:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run one-time brand migration
        run: node scripts/rename-brand-to-masterota.mjs

      - name: Commit Masterota rename
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No brand changes were required."
            exit 0
          fi

          git commit -m "Rename Gabaloo to Masterota"
          git push origin HEAD:master
